<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bruno Manarin · Music Universe</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-brand">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
      </svg>
      Music Universe
    </div>
    <a id="nav-spotify-link" href="#" target="_blank" rel="noopener" class="nav-spotify-link">
      Open on Spotify ↗
    </a>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">
      <img id="hero-avatar" src="" alt="avatar" class="hero-avatar" />
      <div class="hero-text">
        <p class="hero-label">MUSIC UNIVERSE OF</p>
        <h1 id="hero-name" class="hero-name">—</h1>
        <div class="hero-stats">
          <div class="hero-stat">
            <span id="stat-followers" class="stat-num">—</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="hero-stat-divider"></div>
          <div class="hero-stat">
            <span id="stat-updated" class="stat-num updated-time">—</span>
            <span class="stat-label">Last updated</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- TIME RANGE SELECTOR -->
  <div class="range-selector-wrap">
    <div class="range-selector">
      <button class="range-btn active" data-range="short_term">Last 4 Weeks</button>
      <button class="range-btn" data-range="medium_term">Last 6 Months</button>
      <button class="range-btn" data-range="long_term">All Time</button>
    </div>
  </div>

  <!-- CONTENT -->
  <main class="content">

    <section class="section">
      <h2 class="section-title">Top Artists</h2>
      <div id="artists-grid" class="artists-grid"></div>
    </section>

    <section class="section">
      <h2 class="section-title">Top Tracks</h2>
      <div id="tracks-list" class="tracks-list"></div>
    </section>

    <div class="charts-row">
      <section class="section chart-section">
        <h2 class="section-title">Your Genres</h2>
        <div class="chart-wrap">
          <canvas id="genre-chart"></canvas>
        </div>
      </section>
      <section class="section chart-section">
        <h2 class="section-title">Music by Decade</h2>
        <p class="section-sub">When was your top music made?</p>
        <div class="chart-wrap">
          <canvas id="audio-chart"></canvas>
        </div>
      </section>
    </div>

    <section class="section">
      <h2 class="section-title">Recently Played</h2>
      <div id="recent-list" class="tracks-list"></div>
    </section>

  </main>

  <footer class="footer">
    Data refreshes every 6 hours via GitHub Actions · Powered by the Spotify Web API
  </footer>

  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
